<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient - Teal to Blue -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="50%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>

    <!-- Accent gradient - Warm Coral -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E6D"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <!-- Receipt gradient -->
    <linearGradient id="receiptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#023E8A" flood-opacity="0.15"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="170" fill="url(#mainGrad)" filter="url(#shadow)"/>

  <!-- Inner ring decoration -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="200" cy="200" r="145" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Receipt paper shape -->
  <path d="M 120 100 
           L 280 100 
           Q 290 100 290 110 
           L 290 320 
           Q 290 330 280 330 
           L 120 330 
           Q 110 330 110 320 
           L 110 110 
           Q 110 100 120 100 Z" 
        fill="url(#receiptGrad)" filter="url(#shadow)"/>

  <!-- Receipt zigzag bottom edge -->
  <path d="M 110 320 
           L 125 310 L 140 320 L 155 310 L 170 320 
           L 185 310 L 200 320 L 215 310 L 230 320 
           L 245 310 L 260 320 L 275 310 L 290 320" 
        fill="none" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>

  <!-- Receipt header line -->
  <line x1="130" y1="130" x2="270" y2="130" stroke="#CBD5E0" stroke-width="2" stroke-linecap="round"/>

  <!-- Receipt text lines (stylized) -->
  <line x1="130" y1="155" x2="220" y2="155" stroke="#A0AEC0" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="175" x2="250" y2="175" stroke="#CBD5E0" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="195" x2="200" y2="195" stroke="#CBD5E0" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="215" x2="240" y2="215" stroke="#CBD5E0" stroke-width="4" stroke-linecap="round"/>

  <!-- Total line -->
  <line x1="130" y1="250" x2="270" y2="250" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Total amount highlight -->
  <rect x="130" y="265" width="80" height="14" rx="4" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="220" y="265" width="50" height="14" rx="4" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Large "K" lettermark overlay -->
  <g transform="translate(200, 200)">
    <!-- K shadow -->
    <text x="2" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="90" font-weight="800" fill="rgba(0,0,0,0.15)" text-anchor="middle">K</text>
    <!-- K main -->
    <text x="0" y="40" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="90" font-weight="800" fill="url(#mainGrad)" text-anchor="middle">K</text>
    <!-- K highlight -->
    <text x="-1" y="39" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="90" font-weight="800" fill="rgba(255,255,255,0.3)" text-anchor="middle">K</text>
  </g>

  <!-- Small decorative coin/currency symbol -->
  <circle cx="315" cy="85" r="22" fill="url(#accentGrad)" filter="url(#shadow)"/>
  <text x="315" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="22" font-weight="700" fill="white" text-anchor="middle">Rp</text>

  <!-- Subtle sparkle decorations -->
  <g fill="#FFD700" opacity="0.6">
    <circle cx="95" cy="130" r="3"/>
    <circle cx="90" cy="145" r="2"/>
    <circle cx="105" cy="140" r="1.5"/>
  </g>

  <g fill="#FFD700" opacity="0.4">
    <circle cx="310" cy="280" r="2.5"/>
    <circle cx="320" cy="290" r="1.5"/>
  </g>
</svg>